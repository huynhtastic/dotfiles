onboarding = false
[keys]
prefix = "ctrl+a"
focus_pane_left  = "prefix+h"
focus_pane_down  = "prefix+j"
focus_pane_up    = "prefix+k"
focus_pane_right = "prefix+l"
split_horizontal = "prefix+double_quote"
split_vertical    = "prefix+percent"
new_tab   = "prefix+c"
close_tab = "prefix+ampersand"
workspace_picker = "prefix+w"
goto             = "prefix+g"
copy_mode  = "prefix+["  # herdr's copy-mode entry key; copy-mode's own internal keys (v/space select, y/Enter copy, q/Esc cancel) aren't configurable

[ui.toast]
delivery = "off"

[ui]
show_agent_labels_on_pane_borders = false
